<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#2a3340" font-size="18" font-weight="600">AI ⊃ ML ⊃ DL ⊃ NLP ⊃ LLM</text>

  <!-- Nesting: outermost = AI -->
  <rect x="30" y="52" width="420" height="280" rx="20" fill="none" stroke="#5b6472" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="52" y="76" fill="#5b6472" font-size="13" font-weight="600">Artificial Intelligence</text>

  <!-- ML -->
  <rect x="58" y="86" width="360" height="226" rx="16" fill="none" stroke="#2a3340" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="78" y="108" fill="#2a3340" font-size="13" font-weight="600">Machine Learning</text>

  <!-- DL -->
  <rect x="86" y="120" width="300" height="174" rx="14" fill="#eef2fb" stroke="#2f6fed" stroke-width="2"/>
  <text x="106" y="142" fill="#2f6fed" font-size="13" font-weight="600">Deep Learning</text>

  <!-- NLP -->
  <rect x="110" y="154" width="250" height="122" rx="12" fill="#fff" stroke="#B48228" stroke-width="2"/>
  <text x="130" y="176" fill="#B48228" font-size="13" font-weight="600">Natural Language Processing</text>

  <!-- LLM -->
  <rect x="136" y="188" width="198" height="72" rx="10" fill="#2f6fed"/>
  <text x="235" y="220" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Large Language Models</text>
  <text x="235" y="242" text-anchor="middle" fill="#eef2fb" font-size="12">GPT · BERT · LLaMA · FinBERT</text>

  <!-- Right panel: text-as-data flow -->
  <rect x="484" y="52" width="210" height="280" rx="16" fill="#eef2fb" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="589" y="78" text-anchor="middle" fill="#2f6fed" font-size="14" font-weight="600">Text as Data</text>

  <!-- Items in right panel -->
  <rect x="500" y="90" width="178" height="36" rx="8" fill="#fff" stroke="#5b6472"/>
  <text x="589" y="113" text-anchor="middle" fill="#2a3340" font-size="12">Raw text (filings, calls)</text>

  <line x1="589" y1="126" x2="589" y2="146" stroke="#2f6fed" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="500" y="148" width="178" height="36" rx="8" fill="#fff" stroke="#5b6472"/>
  <text x="589" y="171" text-anchor="middle" fill="#2a3340" font-size="12">Tokenise &amp; embed</text>

  <line x1="589" y1="184" x2="589" y2="204" stroke="#2f6fed" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="500" y="206" width="178" height="36" rx="8" fill="#fff" stroke="#B48228"/>
  <text x="589" y="229" text-anchor="middle" fill="#2a3340" font-size="12">LLM feature extraction</text>

  <line x1="589" y1="242" x2="589" y2="262" stroke="#2f6fed" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="500" y="264" width="178" height="46" rx="8" fill="#2f6fed"/>
  <text x="589" y="284" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Finance insight</text>
  <text x="589" y="302" text-anchor="middle" fill="#eef2fb" font-size="11">sentiment · risk · PD</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2f6fed"/>
    </marker>
  </defs>
</svg>
