<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2f6fed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#2a3340" font-size="18" font-weight="600">Financial Document Summarization Pipeline</text>

  <!-- Box 1: Source -->
  <rect x="20" y="110" width="130" height="140" rx="12" fill="#eef2fb" stroke="#2f6fed" stroke-width="2"/>
  <rect x="20" y="110" width="130" height="34" rx="12" fill="#2f6fed"/>
  <rect x="20" y="130" width="130" height="14" fill="#2f6fed"/>
  <text x="85" y="134" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Source</text>
  <text x="85" y="162" text-anchor="middle" fill="#2a3340" font-size="12">10-K / 10-Q</text>
  <text x="85" y="180" text-anchor="middle" fill="#5b6472" font-size="11">Earnings calls</text>
  <text x="85" y="196" text-anchor="middle" fill="#5b6472" font-size="11">Analyst reports</text>
  <text x="85" y="214" text-anchor="middle" fill="#5b6472" font-size="11">100k+ tokens</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="180" x2="180" y2="180" stroke="#2f6fed" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Box 2: Chunking -->
  <rect x="182" y="110" width="130" height="140" rx="12" fill="#eef2fb" stroke="#B48228" stroke-width="2"/>
  <rect x="182" y="110" width="130" height="34" rx="12" fill="#B48228"/>
  <rect x="182" y="130" width="130" height="14" fill="#B48228"/>
  <text x="247" y="134" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Chunking</text>
  <text x="247" y="162" text-anchor="middle" fill="#2a3340" font-size="12">Split by section</text>
  <text x="247" y="180" text-anchor="middle" fill="#5b6472" font-size="11">Overlap window</text>
  <text x="247" y="196" text-anchor="middle" fill="#5b6472" font-size="11">Semantic boundary</text>
  <text x="247" y="214" text-anchor="middle" fill="#5b6472" font-size="11">detection</text>

  <!-- Arrow 2→3 -->
  <line x1="312" y1="180" x2="342" y2="180" stroke="#2f6fed" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Box 3: Map -->
  <rect x="344" y="110" width="130" height="140" rx="12" fill="#eef2fb" stroke="#2a3340" stroke-width="2"/>
  <rect x="344" y="110" width="130" height="34" rx="12" fill="#2a3340"/>
  <rect x="344" y="130" width="130" height="14" fill="#2a3340"/>
  <text x="409" y="134" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Map → Reduce</text>
  <text x="409" y="162" text-anchor="middle" fill="#2a3340" font-size="12">Summarize each</text>
  <text x="409" y="180" text-anchor="middle" fill="#5b6472" font-size="11">chunk in parallel</text>
  <text x="409" y="196" text-anchor="middle" fill="#5b6472" font-size="11">Merge partial</text>
  <text x="409" y="214" text-anchor="middle" fill="#5b6472" font-size="11">summaries</text>

  <!-- Arrow 3→4 -->
  <line x1="474" y1="180" x2="504" y2="180" stroke="#2f6fed" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Box 4: Exec Summary -->
  <rect x="506" y="110" width="190" height="140" rx="12" fill="#eef2fb" stroke="#2f6fed" stroke-width="2"/>
  <rect x="506" y="110" width="190" height="34" rx="12" fill="#2f6fed"/>
  <rect x="506" y="130" width="190" height="14" fill="#2f6fed"/>
  <text x="601" y="134" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Executive Summary</text>
  <text x="601" y="162" text-anchor="middle" fill="#2a3340" font-size="12">Key risks &amp; drivers</text>
  <text x="601" y="180" text-anchor="middle" fill="#5b6472" font-size="11">Financial highlights</text>
  <text x="601" y="196" text-anchor="middle" fill="#5b6472" font-size="11">Analyst-ready format</text>
  <text x="601" y="214" text-anchor="middle" fill="#5b6472" font-size="11">~500 tokens</text>

  <!-- Bottom caption -->
  <text x="360" y="295" text-anchor="middle" fill="#5b6472" font-size="12">Map-reduce overcomes context-window limits for long financial documents</text>
</svg>
